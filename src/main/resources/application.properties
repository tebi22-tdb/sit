spring.application.name=sit
server.port=8081
# Tras Nginx como proxy inverso: cookies y URLs coherentes con el host público
server.forward-headers-strategy=framework

# JWT (sesión por pestaña en el front: Bearer; cambiar en producción con variable de entorno)
sit.jwt.secret=${SIT_JWT_SECRET:cambiarEnProduccionClaveJwtMin32Caracteres!!}
sit.jwt.expiration-hours=12

# MongoDB: servidor 77.37.74.122, base sit_titulacion, colección "registro" (en Egresado.kt)
# Además de connectTimeoutMS, limitamos selección de servidor y lectura de socket para no dejar colgada la UI local si la VPS responde lento.
spring.data.mongodb.uri=mongodb://77.37.74.122:27017/sit_titulacion?connectTimeoutMS=10000&serverSelectionTimeoutMS=5000&socketTimeoutMS=5000
spring.data.mongodb.database=sit_titulacion

# Jackson 2 para JSON
spring.http.converters.preferred-json-mapper=jackson2

# Mail: Gmail — usar contraseña de aplicación (16 caracteres) SIN espacios; SitMailSenderConfig también quita espacios por si acaso.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=l21920103@voaxaca.tecnm.mx
spring.mail.password=wztcmdgdkajggmwh
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- PDF anexos ---
# 9.1 y 9.3: plantillas XHTML en classpath (templates/html/*.html) vía OpenHTMLtoPDF — sin LibreOffice.
# 9.2: Word .docx + LibreOffice (rutas abajo).
sit.soffice.path=C:/Program Files/LibreOffice/program/soffice.exe

# Solo anexo 9.2 (DOCX en disco o recurso empaquetado). Las propiedades 91/93 se ignoran para PDF; puedes borrarlas o dejarlas por si se reactiva DOCX.
sit.anexo92.plantilla-docx=${user.home}/Downloads/Anexo9.2.docx
