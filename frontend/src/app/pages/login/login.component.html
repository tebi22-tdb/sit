<div class="login-page">
  <div class="login-wrap">
    <aside class="login-brand">
      <div class="login-logos">
        <img src="assets/images/logo-tecnm.png" alt="TecNM" class="login-logo" />
        <img src="assets/images/logo-itvo.png" alt="ITVO" class="login-logo" />
      </div>
      <p class="login-kicker">Acceso institucional</p>
      <h1 class="login-titulo">SITVO</h1>
      <p class="login-subtitulo">Sistema Integral de Titulación del Valle de Oaxaca</p>
    </aside>
    <div class="login-card">
      <form (ngSubmit)="onSubmit()" class="login-form">
        <h2 class="login-form-titulo">Iniciar sesión</h2>
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Número de control o usuario"
          autocomplete="username"
        />
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Contraseña"
          autocomplete="current-password"
        />
        <p *ngIf="error" class="error">{{ error }}</p>
        <button type="submit" class="btn-login" [disabled]="loading">
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
        <p class="login-ayuda">Si no recuerdas tu acceso, contacta al área administrativa.</p>
      </form>
    </div>
  </div>
</div>
